name: Deploy to Production

on:
  workflow_dispatch:

env:
  PROJECT_ID: entraycompara
  REGION_BACKEND: europe-west1
  REGION_FRONTEND: us-west1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          IMAGE=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/backend-upload-service:latest
          docker build -t $IMAGE apps/backend-upload-service
          docker push $IMAGE

      - name: Deploy backend to Cloud Run (production)
        run: |
          gcloud run deploy backend-upload-service \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION_BACKEND }} \
            --image=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/backend-upload-service:latest \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars=GCP_BUCKET_NAME=entraycompara-invoices \
            --set-secrets="GMAIL_USER=GMAIL_USER:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest" \
            --set-env-vars=OPERATOR_SECRET_KEY=${{ secrets.BACKEND_OPERATOR_SECRET_KEY }} \
            --set-env-vars=WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }} \
            --set-env-vars=WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }} \
            --set-env-vars=WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }} \
            --service-account=910753338248-compute@developer.gserviceaccount.com \
            --memory=512Mi --cpu=1 --max-instances=3 --timeout=300

  deploy-landing:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push landing page image
        run: |
          IMAGE=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/entraycompara-landing-page-prod:latest
          docker build -t $IMAGE apps/landing-page
          docker push $IMAGE

      - name: Deploy landing page to Cloud Run (production)
        run: |
          gcloud run deploy entraycompara-landing-page-prod \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION_FRONTEND }} \
            --image=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/entraycompara-landing-page-prod:latest \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=910753338248-compute@developer.gserviceaccount.com \
            --memory=512Mi --cpu=1 --max-instances=3 --timeout=300 --port=3000

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and push admin panel image
        run: |
          IMAGE=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/entraycompara-adminpanel:latest
          docker build -t $IMAGE apps/admin-panel
          docker push $IMAGE

      - name: Deploy admin panel to Cloud Run (production)
        run: |
          gcloud run deploy entraycompara-adminpanel \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION_FRONTEND }} \
            --image=europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/entraycompara-adminpanel:latest \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=910753338248-compute@developer.gserviceaccount.com \
            --memory=512Mi --cpu=1 --max-instances=3 --timeout=300 --port=3000
